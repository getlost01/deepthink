<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Fallback matches DSThemePalette.dark — Swift injects palette via window.setTheme at document start. */
  :root {
    --bg: transparent;
    --text: #E6EDF3;
    --text-dim: #6B7380;
    --border: rgba(230,237,243,0.08);
    --accent: #66A0F2;
    --on-accent: #ffffff;
    --code-bg: rgba(230,237,243,0.08);
    --code-text: #C29433;
    --block-bg: rgba(230,237,243,0.05);
    --toolbar-bg: #0C1017;
    --toolbar-border: rgba(230,237,243,0.12);
    --highlight: rgba(194,148,51,0.24);
    --accent-subtle: rgba(102,160,242,0.12);
    --accent-subtle-hover: rgba(102,160,242,0.24);
    --accent-dashed: rgba(102,160,242,0.50);
    --selection: rgba(102,160,242,0.28);
    --shadow: rgba(0,0,0,0.22);
    --success: #4AAD5C;
    color-scheme: dark;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  #toolbar {
    display: flex;
    gap: 1px;
    padding: 3px 10px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--toolbar-border);
    position: sticky;
    top: 0;
    z-index: 10;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }

  .tb-btn {
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    border: none; background: none;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.12s;
    flex-shrink: 0;
  }
  .tb-btn:hover { background: var(--border); color: var(--text); }
  .tb-btn.active { background: var(--accent); color: var(--on-accent, #ffffff); }
  .tb-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  .tb-sep {
    width: 1px; height: 18px;
    background: var(--border);
    margin: 0 3px;
    flex-shrink: 0;
  }

  .tb-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  /* Editor */
  .ProseMirror { padding: 14px 18px; outline: none; min-height: calc(100vh - 38px); }
  .ProseMirror > * + * { margin-top: 0.4em; }
  .ProseMirror p { margin: 0 0 4px; }

  .ProseMirror h1 { font-size: 24px; font-weight: 700; margin: 20px 0 6px; line-height: 1.25; }
  .ProseMirror h2 { font-size: 19px; font-weight: 700; margin: 16px 0 4px; line-height: 1.3; }
  .ProseMirror h3 { font-size: 15px; font-weight: 600; margin: 12px 0 4px; line-height: 1.4; }

  .ProseMirror strong { font-weight: 700; }
  .ProseMirror em { font-style: italic; }
  .ProseMirror u { text-decoration: underline; }
  .ProseMirror s { text-decoration: line-through; color: var(--text-dim); }

  .ProseMirror mark { background: var(--highlight); border-radius: 2px; padding: 0 2px; }

  .ProseMirror code {
    font-family: 'Menlo', 'SF Mono', monospace;
    font-size: 11.5px;
    background: var(--code-bg);
    color: var(--code-text);
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
  }

  .ProseMirror pre {
    font-family: 'Menlo', 'SF Mono', monospace;
    font-size: 12px;
    background: var(--block-bg);
    border: 1px solid var(--border);
    padding: 14px 16px;
    border-radius: 8px;
    margin: 10px 0;
    overflow-x: auto;
    line-height: 1.5;
  }
  .ProseMirror pre code {
    background: none; padding: 0; color: var(--text); border-radius: 0; font-weight: 400;
  }

  .ProseMirror blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 14px;
    margin: 8px 0;
    color: var(--text-dim);
  }

  .ProseMirror ul, .ProseMirror ol { padding-left: 24px; margin: 4px 0; }
  .ProseMirror li { margin: 2px 0; }
  .ProseMirror li p { margin: 0; }

  .ProseMirror ul[data-type="taskList"] { list-style: none; padding-left: 4px; }
  .ProseMirror ul[data-type="taskList"] li { display: flex; align-items: flex-start; gap: 8px; }
  .ProseMirror ul[data-type="taskList"] li label { margin-top: 3px; cursor: pointer; }
  .ProseMirror ul[data-type="taskList"] li label input[type="checkbox"] {
    width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer;
  }
  .ProseMirror ul[data-type="taskList"] li[data-checked="true"] > div > p {
    text-decoration: line-through; color: var(--text-dim);
  }

  .ProseMirror a { color: var(--accent); text-decoration: underline; cursor: pointer; }

  .ProseMirror hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  .ProseMirror p.is-editor-empty:first-child::before {
    content: attr(data-placeholder);
    color: var(--text-dim); pointer-events: none; float: left; height: 0; opacity: 0.5;
  }

  /* Tables */
  .ProseMirror table {
    border-collapse: collapse;
    width: 100%;
    margin: 10px 0;
    overflow: hidden;
    table-layout: fixed;
  }
  .ProseMirror table td,
  .ProseMirror table th {
    border: 1px solid var(--border);
    padding: 6px 10px;
    vertical-align: top;
    position: relative;
    min-width: 60px;
  }
  .ProseMirror table th {
    background: var(--block-bg);
    font-weight: 600;
  }
  .ProseMirror table td > *,
  .ProseMirror table th > * {
    margin: 0;
  }
  .ProseMirror table .selectedCell {
    background: var(--accent-subtle);
  }
  .ProseMirror table .column-resize-handle {
    position: absolute;
    right: -2px;
    top: 0;
    bottom: 0;
    width: 4px;
    background: var(--accent);
    pointer-events: none;
  }
  .ProseMirror.resize-cursor { cursor: col-resize; }

  /* Quick Capture / embedded hosts — flat overlays, no floating shadows */
  body.compact-chrome #slash-menu,
  body.compact-chrome #wiki-ac-menu,
  body.compact-chrome #link-preview,
  body.compact-chrome #link-popover {
    box-shadow: none !important;
  }

  /* Slash Command Menu */
  #slash-menu {
    position: fixed;
    z-index: 200;
    background: var(--toolbar-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    min-width: 200px;
    max-height: 320px;
    overflow-y: auto;
    box-shadow: 0 8px 24px var(--shadow);
  }
  .slash-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.08s;
  }
  .slash-item:hover, .slash-item.selected {
    background: var(--border);
  }
  .slash-icon {
    width: 28px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    background: var(--code-bg);
    border-radius: 5px;
    flex-shrink: 0;
  }
  .slash-icon svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .slash-label {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
  }
  .slash-group-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.4px;
    text-transform: uppercase;
    padding: 6px 10px 2px;
    margin-top: 2px;
  }
  .slash-group-label:first-child {
    margin-top: 0;
    padding-top: 2px;
  }
  .slash-empty {
    padding: 8px 12px;
    color: var(--text-dim);
    font-size: 12px;
  }

  /* Search & Replace Bar */
  #search-bar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--toolbar-border);
    padding: 6px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .search-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #search-bar input {
    flex: 1;
    border: 1px solid var(--border);
    background: var(--block-bg);
    color: var(--text);
    border-radius: 5px;
    padding: 4px 8px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    min-width: 0;
  }
  #search-bar input:focus {
    border-color: var(--accent);
  }
  #search-count {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 60px;
    text-align: center;
  }
  .search-btn {
    border: none;
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    padding: 3px 6px;
    border-radius: 4px;
    font-weight: 600;
    white-space: nowrap;
    transition: all 0.1s;
  }
  .search-btn:hover {
    background: var(--border);
    color: var(--text);
  }
  #replace-one, #replace-all {
    background: var(--code-bg);
    padding: 3px 8px;
  }

  /* Search highlights */
  .search-highlight {
    background: rgba(255, 200, 0, 0.25);
    border-radius: 2px;
  }
  .search-highlight-current {
    background: rgba(255, 140, 0, 0.55);
    border-radius: 2px;
  }

  .wiki-link {
    color: var(--accent);
    background: var(--accent-subtle);
    border-radius: 3px;
    padding: 0 3px;
    cursor: pointer;
    border-bottom: 1px dashed var(--accent-dashed);
    font-style: italic;
  }
  .wiki-link:hover {
    background: var(--accent-subtle-hover);
  }
  .wiki-link-resolved {
    border-bottom-style: solid;
  }

  /* Wiki autocomplete */
  #wiki-ac-menu {
    position: fixed;
    z-index: 200;
    background: var(--toolbar-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    min-width: 200px;
    max-width: 320px;
    max-height: 240px;
    overflow-y: auto;
    box-shadow: 0 8px 24px var(--shadow);
  }
  .wiki-ac-item {
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12.5px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .wiki-ac-item.selected, .wiki-ac-item:hover { background: var(--border); }

  /* Link preview tooltip */
  #link-preview {
    position: fixed;
    z-index: 300;
    background: var(--toolbar-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    max-width: 260px;
    box-shadow: 0 6px 20px var(--shadow);
    pointer-events: none;
  }
  .lp-title { font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .lp-subtitle { font-size: 11px; color: var(--accent); margin-bottom: 4px; }
  .lp-snippet { font-size: 11.5px; color: var(--text-dim); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  /* Dead links */
  .ProseMirror a.dead-link {
    color: var(--text-dim);
    text-decoration: line-through;
    opacity: 0.6;
  }

  .ProseMirror ::selection { background: var(--selection); }
</style>
</head>
<body>

<div id="toolbar">
  <!-- Text formatting -->
  <button class="tb-btn" data-action="bold" title="Bold ⌘B">
    <svg viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
  </button>
  <button class="tb-btn" data-action="italic" title="Italic ⌘I">
    <svg viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
  </button>
  <button class="tb-btn" data-action="underline" title="Underline ⌘U">
    <svg viewBox="0 0 24 24"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg>
  </button>
  <button class="tb-btn" data-action="strike" title="Strikethrough ⌘⇧X">
    <svg viewBox="0 0 24 24"><path d="M16 4c-1.5-1.2-3.5-2-6-2-3 0-5 1.5-5 4 0 2 1.5 3 4 3.5"/><line x1="4" y1="12" x2="20" y2="12"/><path d="M15 12.5c1 .5 2 1.5 2 3 0 2.5-2 4-5 4-2.5 0-4.5-.8-6-2"/></svg>
  </button>
  <button class="tb-btn" data-action="highlight" title="Highlight">
    <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Headings -->
  <button class="tb-btn" data-action="h1" title="Heading 1 ⌘⇧1"><span class="tb-label">H1</span></button>
  <button class="tb-btn" data-action="h2" title="Heading 2 ⌘⇧2"><span class="tb-label">H2</span></button>
  <button class="tb-btn" data-action="h3" title="Heading 3 ⌘⇧3"><span class="tb-label">H3</span></button>
  <button class="tb-btn" data-action="body" title="Body text ⌘⇧0"><span class="tb-label" style="font-weight:400">P</span></button>

  <div class="tb-sep"></div>

  <!-- Lists -->
  <button class="tb-btn" data-action="bulletList" title="Bullet List">
    <svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="5" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="5" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
  </button>
  <button class="tb-btn" data-action="orderedList" title="Numbered List">
    <svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="20" y2="6"/><line x1="10" y1="12" x2="20" y2="12"/><line x1="10" y1="18" x2="20" y2="18"/><text x="4" y="8" font-size="7" fill="currentColor" stroke="none" font-weight="700">1</text><text x="4" y="14" font-size="7" fill="currentColor" stroke="none" font-weight="700">2</text><text x="4" y="20" font-size="7" fill="currentColor" stroke="none" font-weight="700">3</text></svg>
  </button>
  <button class="tb-btn" data-action="taskList" title="Checklist">
    <svg viewBox="0 0 24 24"><rect x="3" y="5" width="6" height="6" rx="1"/><path d="M5 8l1.5 1.5L9 7"/><line x1="13" y1="8" x2="21" y2="8"/><rect x="3" y="13" width="6" height="6" rx="1"/><line x1="13" y1="16" x2="21" y2="16"/></svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Blocks -->
  <button class="tb-btn" data-action="link" title="Link ⌘K">
    <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
  </button>
  <button class="tb-btn" data-action="code" title="Inline Code ⌘E">
    <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  </button>
  <button class="tb-btn" data-action="codeBlock" title="Code Block">
    <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/><rect x="1" y="1" width="22" height="22" rx="3" stroke-width="1.2" stroke-dasharray="0"/></svg>
  </button>
  <button class="tb-btn" data-action="blockquote" title="Quote">
    <svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
  </button>
  <button class="tb-btn" data-action="hr" title="Divider">
    <svg viewBox="0 0 24 24"><line x1="2" y1="12" x2="22" y2="12" stroke-width="2"/></svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Table -->
  <button class="tb-btn" data-action="insertTable" title="Insert Table">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
  </button>
  <button class="tb-btn" data-action="addColAfter" title="Add Column">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="12" height="18" rx="2"/><line x1="3" y1="9" x2="15" y2="9"/><line x1="3" y1="15" x2="15" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="21" y1="9" x2="21" y2="15"/><line x1="18" y1="12" x2="24" y2="12"/></svg>
  </button>
  <button class="tb-btn" data-action="addRowAfter" title="Add Row">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="12" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="15"/><line x1="15" y1="3" x2="15" y2="15"/><line x1="9" y1="21" x2="15" y2="21"/><line x1="12" y1="18" x2="12" y2="24"/></svg>
  </button>
  <button class="tb-btn" data-action="deleteCol" title="Delete Column">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="11" y1="9" x2="13" y2="13" stroke="currentColor" stroke-width="2"/><line x1="13" y1="9" x2="11" y2="13" stroke="currentColor" stroke-width="2"/></svg>
  </button>
  <button class="tb-btn" data-action="deleteRow" title="Delete Row">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="11" x2="15" y2="13" stroke="currentColor" stroke-width="2"/><line x1="15" y1="11" x2="9" y2="13" stroke="currentColor" stroke-width="2"/></svg>
  </button>
  <button class="tb-btn" data-action="deleteTable" title="Delete Table">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="8" y1="8" x2="16" y2="16" stroke="currentColor" stroke-width="2"/><line x1="16" y1="8" x2="8" y2="16" stroke="currentColor" stroke-width="2"/></svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Alignment -->
  <button class="tb-btn" data-action="alignLeft" title="Align Left">
    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
  </button>
  <button class="tb-btn" data-action="alignCenter" title="Align Center">
    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
  </button>
  <button class="tb-btn" data-action="alignRight" title="Align Right">
    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/></svg>
  </button>
</div>

<div id="editor"></div>

<script>
  window.setTheme = function(vars) {
    var root = document.documentElement;
    Object.keys(vars).forEach(function(key) {
      if (key === 'color-scheme') return;
      root.style.setProperty('--' + key, vars[key]);
    });
    if (vars['color-scheme']) {
      root.style.colorScheme = vars['color-scheme'];
      root.dataset.theme = vars['color-scheme'];
    } else {
      root.dataset.theme = 'dark';
    }
  };
</script>
<script src="editor.bundle.js"></script>
</body>
</html>
