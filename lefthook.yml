pre-commit:
  parallel: true
  commands:
    swift-format:
      glob: "DeepThink/**/*.swift"
      run: |
        if which swiftformat > /dev/null; then
          swiftformat {staged_files} --config .swiftformat && git add {staged_files}
        else
          echo "warning: SwiftFormat not installed — run 'brew install swiftformat'"
        fi

    swift-lint:
      glob: "DeepThink/**/*.swift"
      run: |
        if which swiftlint > /dev/null; then
          swiftlint lint --fix --config .swiftlint.yml {staged_files} && git add {staged_files}
        else
          echo "warning: SwiftLint not installed — run 'brew install swiftlint'"
        fi

    ts-check:
      glob: "cli/src/**/*.ts"
      run: cd cli && bunx biome check --write src/ && git -C .. add cli/src/

    secret-scan:
      run: |
        if which gitleaks > /dev/null; then
          gitleaks protect --staged --redact --exit-code 1
        else
          echo "warning: gitleaks not installed — run 'brew install gitleaks'"
        fi
