name: DeepThink
options:
  bundleIdPrefix: com.deepthink
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  DeepThink:
    type: application
    platform: macOS
    sources:
      - path: DeepThink
        excludes:
          - "Preview Content"
    dependencies:
      - package: SwiftTerm
    preBuildScripts:
      - script: |
          if which swiftformat > /dev/null; then
            swiftformat "${SRCROOT}/DeepThink" --config "${SRCROOT}/.swiftformat"
          else
            echo "warning: SwiftFormat not installed — run 'brew install swiftformat'"
          fi
        name: SwiftFormat
      - script: |
          if which swiftlint > /dev/null; then
            swiftlint lint --config "${SRCROOT}/.swiftlint.yml"
          else
            echo "warning: SwiftLint not installed — run 'brew install swiftlint'"
          fi
        name: SwiftLint
    postCompileScripts:
      - script: |
          if [ -f "${SRCROOT}/cli/deepthink" ]; then
            mkdir -p "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
            cp "${SRCROOT}/cli/deepthink" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/deepthink-cli"
          fi
        name: Bundle DeepThink CLI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deepthink.app
        PRODUCT_NAME: DeepThink
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_ENTITLEMENTS: DeepThink/DeepThink.entitlements
        ENABLE_PREVIEWS: "YES"
    entitlements:
      path: DeepThink/DeepThink.entitlements
      properties:
        com.apple.security.app-sandbox: false
