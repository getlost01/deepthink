name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build CLI + MCP
        working-directory: cli
        run: bash build.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (Release, unsigned)
        run: |
          xcodebuild build \
            -project DeepThink.xcodeproj \
            -scheme DeepThink \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath build/derivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty --color || true; exit "${PIPESTATUS[0]}"

      - name: Ad-hoc sign app
        run: |
          APP_PATH="build/derivedData/Build/Products/Release/DeepThink.app"
          codesign --force --deep --sign - "$APP_PATH"

      - name: Package zip
        run: |
          APP_PATH="build/derivedData/Build/Products/Release/DeepThink.app"
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_NAME="DeepThink-${VERSION}.zip"
          mkdir -p dist
          ditto -c -k --keepParent "$APP_PATH" "dist/$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Compute SHA256
        run: |
          SHA=$(shasum -a 256 "dist/$ZIP_NAME" | awk '{print $1}')
          echo "SHA256=$SHA" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          name: "DeepThink ${{ env.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## DeepThink ${{ env.VERSION }}

            ### Install via Homebrew
            ```bash
            brew tap getlost01/deepthink
            brew install --cask deepthink
            ```

            ### Manual install
            Download `DeepThink-${{ env.VERSION }}.zip`, unzip, drag to `/Applications`.
            Then run once to clear quarantine:
            ```bash
            xattr -rd com.apple.quarantine /Applications/DeepThink.app
            ```

            ---
            **SHA256:** `${{ env.SHA256 }}`
          files: dist/${{ env.ZIP_NAME }}

      - name: Update Homebrew cask
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone https://github.com/getlost01/homebrew-deepthink.git /tmp/tap --depth=1
          cp homebrew/deepthink.rb /tmp/tap/Casks/deepthink.rb
          sed -i '' \
            -e "s/version \"[^\"]*\"/version \"${{ env.VERSION }}\"/" \
            -e "s/sha256 \"[^\"]*\"/sha256 \"${{ env.SHA256 }}\"/" \
            /tmp/tap/Casks/deepthink.rb
          cd /tmp/tap
          git add Casks/deepthink.rb
          git diff --cached --quiet || git commit -m "chore: release v${{ env.VERSION }}"
          git -c "http.extraHeader=Authorization: token ${TAP_TOKEN}" push origin main
