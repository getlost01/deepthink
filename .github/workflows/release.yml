name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g. v1.0.1). Required for manual runs."
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve release tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -z "${{ inputs.tag }}" ]]; then
              echo "::error::Manual release requires inputs.tag (e.g. v1.0.1)"
              exit 1
            fi
            TAG="${{ inputs.tag }}"
            git fetch --tags --force
            git checkout "$TAG"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          IS_PRERELEASE="false"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG (version $VERSION)"

      - name: Verify version alignment
        run: bash scripts/release/verify-version.sh "${{ steps.meta.outputs.tag }}"

  build-and-release:
    name: Build & publish
    needs: validate
    runs-on: macos-15
    timeout-minutes: 60
    outputs:
      sha256: ${{ steps.package.outputs.sha256 }}
      zip_name: ${{ steps.package.outputs.zip_name }}
    env:
      GITHUB_REF_NAME: ${{ needs.validate.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Manual re-runs use the workflow commit (fixes on main); tag pushes use the tag.
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || needs.validate.outputs.tag }}

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build app + bundle CLI/MCP
        run: bash scripts/release/build-macos-app.sh

      - name: Package release zip
        run: bash scripts/release/package-zip.sh "${{ needs.validate.outputs.tag }}"

      - name: Record package outputs
        id: package
        run: |
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Render release notes
        id: notes
        run: |
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          bash scripts/release/render-release-notes.sh "${{ needs.validate.outputs.version }}" "${{ steps.package.outputs.sha256 }}" > "$NOTES_FILE"
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          name: "DeepThink ${{ needs.validate.outputs.version }}"
          tag_name: ${{ needs.validate.outputs.tag }}
          draft: false
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          body_path: ${{ steps.notes.outputs.path }}
          files: dist/DeepThink-${{ needs.validate.outputs.version }}.zip
          fail_on_unmatched_files: true

  update-homebrew:
    name: Update Homebrew cask
    needs: [validate, build-and-release]
    if: needs.validate.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || needs.validate.outputs.tag }}

      - name: Push cask to homebrew-deepthink tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          bash scripts/release/update-homebrew-cask.sh \
            "${{ needs.validate.outputs.version }}" \
            "${{ needs.build-and-release.outputs.sha256 }}"
