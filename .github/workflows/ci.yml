name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (no signing)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build CLI + MCP
        working-directory: cli
        run: bash build.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (no signing)
        run: |
          xcodebuild build \
            -project DeepThink.xcodeproj \
            -scheme DeepThink \
            -configuration Debug \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty --color 2>/dev/null || cat

  lint-cli:
    name: Lint CLI (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: cli
        run: bun install

      - name: Type check
        working-directory: cli
        run: bun tsc --noEmit 2>/dev/null || bun x tsc --noEmit

      - name: Lint (biome)
        working-directory: cli
        run: bun x biome check src/ || true
