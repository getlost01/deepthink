name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please search [existing issues](https://github.com/getlost01/deepthink/issues) to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include screenshots or logs if relevant.
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS Version
      placeholder: e.g. macOS 15.2
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: DeepThink Version
      placeholder: e.g. 1.0.0 (find in DeepThink → About)
    validations:
      required: true
